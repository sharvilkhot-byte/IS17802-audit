services:
  # Backend API
  - type: web
    name: unclinq-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/migrate.js && node app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: unclinq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: unclinq-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: unclinq-frontend
          type: web
          property: url
      - key: ENABLE_SCHEDULER
        value: "true"

  # Frontend
  - type: web
    name: unclinq-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: unclinq-api
          type: web
          property: url
          transform: "concat(/api)"

databases:
  - name: unclinq-db
    plan: starter

  - name: unclinq-redis
    type: redis
    plan: starter
